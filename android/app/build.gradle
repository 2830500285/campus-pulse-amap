plugins {
    id 'com.android.application'
}

def defaultWebAppUrl = providers.gradleProperty('WEB_APP_URL')
    .getOrElse('https://2830500285.github.io/campus-pulse-amap/#/')

android {
    namespace 'com.campuspulse.amap'
    compileSdk 35

    defaultConfig {
        applicationId 'com.campuspulse.amap'
        minSdk 23
        targetSdk 35
        versionCode 4
        versionName '1.3'
        buildConfigField 'String', 'WEB_APP_URL', "\"${defaultWebAppUrl}\""
    }

    buildFeatures {
        buildConfig true
    }
}
